name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.0)'
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & Push Multi-Arch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "v${{ inputs.version }}" \
            --dir release-assets \
            --pattern "vizier-v${{ inputs.version }}-*-linux-gnu.tar.gz"
          ls -lh release-assets/

      - name: Stage assets for buildx
        run: |
          VERSION="${{ inputs.version }}"
          declare -A TRIPLES=( [amd64]=x86_64-unknown-linux-gnu [arm64]=aarch64-unknown-linux-gnu )
          for ARCH in amd64 arm64; do
            TRIPLE="${TRIPLES[$ARCH]}"
            tar -xzf "release-assets/vizier-v${VERSION}-${TRIPLE}.tar.gz"
            mv "vizier-v${VERSION}-${TRIPLE}" "vizier-v${VERSION}-${ARCH}"
            tar -czf "vizier-v${VERSION}-${ARCH}.tar.gz" "vizier-v${VERSION}-${ARCH}"
            rm -rf "vizier-v${VERSION}-${ARCH}"
          done
          rm -rf release-assets/
          ls -lh *.tar.gz

      - name: Determine tags
        id: tags
        run: |
          VERSION="${{ inputs.version }}"
          HUB_REPO="blinfoldking/vizier"
          GHCR_REPO="ghcr.io/${{ github.repository }}"
          TAGS="${GHCR_REPO}:${VERSION},${HUB_REPO}:${VERSION}"
          if [[ "$VERSION" != *-* ]]; then
            TAGS="${TAGS},${GHCR_REPO}:latest,${HUB_REPO}:latest"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Tags: $TAGS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sync Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: blinfoldking/vizier
          short-description: 21st Century Digital Steward
          readme-filepath: ./DOCKERHUB.md

      - name: Build and push multi-arch manifest list
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.title=vizier
            org.opencontainers.image.description=21st Century Digital Steward
          build-args: |
            VERSION=${{ inputs.version }}
