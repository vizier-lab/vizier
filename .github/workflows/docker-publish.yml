name: Docker Publish

on:
  workflow_run:
    workflows: ["Release & Build"]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & Push - ${{ matrix.platform }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux/amd64
          - target: aarch64-unknown-linux-gnu
            platform: linux/arm64/v8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Determine if stable release
        id: stable
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [[ "$VERSION" == *-* ]]; then
            echo "stable=false" >> $GITHUB_OUTPUT
          else
            echo "stable=true" >> $GITHUB_OUTPUT
          fi

      - name: Download release asset for ${{ matrix.target }}
        run: |
          gh release download v${{ steps.version.outputs.VERSION }} \
            --dir . \
            --pattern "*${{ matrix.target }}*.tar.gz"
          echo "ASSET_NAME=vizier-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.tar.gz" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ${{ steps.stable.outputs.stable && 'ghcr.io/${{ github.repository }}:latest' || '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.title=vizier
            org.opencontainers.image.description=21st Century Digital Steward
          build-args: |
            TARGET_DIR=vizier-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}