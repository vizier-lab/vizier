name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & Push Multi-Arch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "v${{ inputs.version }}" \
            --dir release-assets \
            --pattern "vizier-v${{ inputs.version }}-*-linux-gnu.tar.gz"
          ls -lh release-assets/

      - name: Stage assets for buildx
        run: |
          VERSION="${{ inputs.version }}"
          mv "release-assets/vizier-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
             "vizier-v${VERSION}-amd64.tar.gz"
          mv "release-assets/vizier-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz" \
             "vizier-v${VERSION}-arm64.tar.gz"
          ls -lh *.tar.gz

      - name: Determine tags
        id: tags
        run: |
          VERSION="${{ inputs.version }}"
          TAGS="ghcr.io/${{ github.repository }}:${VERSION}"
          if [[ "$VERSION" != *-* ]]; then
            TAGS="$TAGS,ghcr.io/${{ github.repository }}:latest"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Tags: $TAGS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch manifest list
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.title=vizier
            org.opencontainers.image.description=21st Century Digital Steward
          build-args: |
            VERSION=${{ inputs.version }}
