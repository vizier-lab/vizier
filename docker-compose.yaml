# Sample compose file for Vizier.
#
# Persists sqlite data to a named volume and exposes the WebUI on port 9999.
# Set VIZIER_JWT_SECRET in your shell, a .env file, or by editing this file.
# Generate a strong value with: openssl rand -hex 32
#
# Usage:
#   echo "VIZIER_JWT_SECRET=$(openssl rand -hex 32)" > .env
#   docker compose up -d
#
# Then open http://localhost:9999

services:
  vizier:
    image: ghcr.io/vizier-lab/vizier:latest
    # For production, pin a specific version (e.g. ...:0.10.0).
    container_name: vizier
    restart: unless-stopped
    ports:
      - "9999:9999"
    volumes:
      - vizier-data:/data
    environment:
      VIZIER_DATA_DIR: /data
      VIZIER_PORT: "9999"
      VIZIER_STORAGE: sqlite
      VIZIER_WORKERS: "4"
      VIZIER_EXTRA_ARGS: "-a"
      RUST_LOG: vizier=info

volumes:
  vizier-data:
