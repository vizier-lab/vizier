name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & Push - ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux/amd64
          - target: aarch64-unknown-linux-gnu
            platform: linux/arm64/v8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine if stable release
        id: stable
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            echo "stable=false" >> $GITHUB_OUTPUT
          else
            echo "stable=true" >> $GITHUB_OUTPUT
          fi

      - name: Download release asset for ${{ matrix.target }}
        run: |
          gh release download v${{ inputs.version }} \
            --dir . \
            --pattern "*${{ matrix.target }}*.tar.gz"
          echo "ASSET_NAME=vizier-${{ inputs.version }}-${{ matrix.target }}.tar.gz" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ inputs.version }}
            ${{ steps.stable.outputs.stable && 'ghcr.io/${{ github.repository }}:latest' || '' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.title=vizier
            org.opencontainers.image.description=21st Century Digital Steward
          build-args: |
            TARGET_DIR=vizier-${{ inputs.version }}-${{ matrix.target }}