name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & Push - ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform: linux/amd64
            arch_suffix: ""
          - target: aarch64-unknown-linux-gnu
            platform: linux/arm64/v8
            arch_suffix: "-arm64"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine if stable release and prepare tags
        id: stable
        run: |
          VERSION="${{ inputs.version }}"
          ARCH_SUFFIX="${{ matrix.arch_suffix }}"
          TAGS="ghcr.io/${{ github.repository }}:${VERSION}${ARCH_SUFFIX}"
          if [[ "$VERSION" == *-* ]]; then
            echo "stable=false" >> $GITHUB_OUTPUT
          else
            echo "stable=true" >> $GITHUB_OUTPUT
            TAGS="$TAGS,ghcr.io/${{ github.repository }}:latest${ARCH_SUFFIX}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Download release asset for ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download v${{ inputs.version }} \
            --dir . \
            --pattern "vizier-v${{ inputs.version }}-${{ matrix.target }}.tar.gz"
          echo "ASSET_NAME=vizier-v${{ inputs.version }}-${{ matrix.target }}.tar.gz" >> $GITHUB_OUTPUT

      - name: Verify downloaded files
        run: |
          echo "Downloaded files:"
          ls -lh *.tar.gz
          echo "Expected file: vizier-v${{ inputs.version }}-${{ matrix.target }}.tar.gz"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.stable.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.title=vizier
            org.opencontainers.image.description=21st Century Digital Steward
          build-args: |
            TARGET_DIR=v${{ inputs.version }}-${{ matrix.target }}